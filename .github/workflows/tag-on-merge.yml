name: tag-on-merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'plugin-update/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse plugin name and version from branch
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          REST="${BRANCH#plugin-update/}"
          VERSION="${REST##*-v}"
          PLUGIN_NAME="${REST%-v${VERSION}}"
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$VERSION"  >> $GITHUB_ENV

      - name: Set marketplace tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${PLUGIN_NAME}--v${PLUGIN_VERSION}"
          git tag "$TAG"
          git push origin "$TAG"
