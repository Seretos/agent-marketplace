name: update-registry

on:
  repository_dispatch:
    types: [plugin-release]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Update marketplace registries (Claude + Codex)
        env:
          PLUGIN_NAME:     ${{ github.event.client_payload.name }}
          PLUGIN_VERSION:  ${{ github.event.client_payload.version }}
          PLUGIN_REPO:     ${{ github.event.client_payload.repo }}
          PLUGIN_REF:      ${{ github.event.client_payload.ref }}
          PLUGIN_CATEGORY: ${{ github.event.client_payload.category }}
          PLUGIN_DESC:     ${{ github.event.client_payload.description }}
        run: |
          python3 - <<'EOF'
          import json, os

          name     = os.environ["PLUGIN_NAME"]
          version  = os.environ["PLUGIN_VERSION"]
          repo     = os.environ["PLUGIN_REPO"]
          # ref defaults to v{version} (the tag the plugin's release.yml created),
          # but the dispatcher may override it (e.g. "release" branch HEAD for
          # rolling installs, or a SHA for pinned-by-commit installs).
          ref      = os.environ.get("PLUGIN_REF") or f"v{version}"
          category = os.environ["PLUGIN_CATEGORY"]
          desc     = os.environ["PLUGIN_DESC"]

          def upsert(plugins, name, entry):
              for i, p in enumerate(plugins):
                  if p["name"] == name:
                      plugins[i] = entry
                      return
              plugins.append(entry)

          # Claude registry: source.source = "github", repo + ref.
          claude_path = ".claude-plugin/marketplace.json"
          with open(claude_path) as f:
              claude_data = json.load(f)
          claude_entry = {
              "name":        name,
              "description": desc,
              "source":      {"source": "github", "repo": repo, "ref": ref},
              "category":    category,
              "version":     version,
          }
          upsert(claude_data.setdefault("plugins", []), name, claude_entry)
          with open(claude_path, "w") as f:
              json.dump(claude_data, f, indent=2)
              f.write("\n")

          # Codex registry: source.source = "url", url + ref (plugin at repo root).
          # Categories and policies don't map 1:1 from the dispatch payload, so
          # default to Productivity / AVAILABLE / ON_INSTALL. Maintainers can
          # hand-edit either field in a follow-up PR if they need to override.
          codex_path = ".agents/plugins/marketplace.json"
          with open(codex_path) as f:
              codex_data = json.load(f)
          codex_entry = {
              "name": name,
              "source": {
                  "source": "url",
                  "url":    f"https://github.com/{repo}.git",
                  "ref":    ref,
              },
              "policy":   {"installation": "AVAILABLE", "authentication": "ON_INSTALL"},
              "category": "Productivity",
          }
          upsert(codex_data.setdefault("plugins", []), name, codex_entry)
          with open(codex_path, "w") as f:
              json.dump(codex_data, f, indent=2)
              f.write("\n")
          EOF

      - name: Commit to feature branch and open PR
        env:
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          PLUGIN_NAME:    ${{ github.event.client_payload.name }}
          PLUGIN_VERSION: ${{ github.event.client_payload.version }}
        run: |
          BRANCH="plugin-update/${PLUGIN_NAME}-v${PLUGIN_VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json .agents/plugins/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes, skipping PR"
            exit 0
          fi
          git commit -m "chore: update ${PLUGIN_NAME} to v${PLUGIN_VERSION}"
          # Idempotent: force-push overwrites a stale branch from a previous
          # run for the same version (e.g. when the workflow was re-triggered).
          git push --force origin "$BRANCH"
          # PR may also already exist for that branch — only create if missing.
          if gh pr view "$BRANCH" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "PR for $BRANCH already exists — leaving it open."
          else
            gh pr create \
              --title "plugin: ${PLUGIN_NAME} v${PLUGIN_VERSION}" \
              --body "Automated registry update triggered by \`${PLUGIN_NAME}\` release pipeline.

          **Plugin:** \`${PLUGIN_NAME}\`
          **Version:** \`${PLUGIN_VERSION}\`

          Review \`.claude-plugin/marketplace.json\` and merge to publish the entry to the registry." \
              --base main \
              --head "$BRANCH"
          fi
