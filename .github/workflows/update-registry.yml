name: update-registry

on:
  repository_dispatch:
    types: [plugin-release]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Update marketplace.json
        env:
          PLUGIN_NAME:     ${{ github.event.client_payload.name }}
          PLUGIN_VERSION:  ${{ github.event.client_payload.version }}
          PLUGIN_REPO:     ${{ github.event.client_payload.repo }}
          PLUGIN_REF:      ${{ github.event.client_payload.ref }}
          PLUGIN_CATEGORY: ${{ github.event.client_payload.category }}
          PLUGIN_DESC:     ${{ github.event.client_payload.description }}
        run: |
          python3 - <<'EOF'
          import json, os
          path = ".claude-plugin/marketplace.json"
          with open(path) as f:
              data = json.load(f)
          name    = os.environ["PLUGIN_NAME"]
          version = os.environ["PLUGIN_VERSION"]
          # ref defaults to v{version} (the tag the plugin's release.yml created),
          # but the dispatcher may override it (e.g. "release" branch HEAD for
          # rolling installs, or a SHA for pinned-by-commit installs).
          ref = os.environ.get("PLUGIN_REF") or f"v{version}"
          entry = {
              "name":        name,
              "description": os.environ["PLUGIN_DESC"],
              "source": {
                  "source": "github",
                  "repo":   os.environ["PLUGIN_REPO"],
                  "ref":    ref,
              },
              "category": os.environ["PLUGIN_CATEGORY"],
              "version":  version,
          }
          plugins = data.setdefault("plugins", [])
          for i, p in enumerate(plugins):
              if p["name"] == name:
                  plugins[i] = entry
                  break
          else:
              plugins.append(entry)
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          EOF

      - name: Commit to feature branch and open PR
        env:
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          PLUGIN_NAME:    ${{ github.event.client_payload.name }}
          PLUGIN_VERSION: ${{ github.event.client_payload.version }}
        run: |
          BRANCH="plugin-update/${PLUGIN_NAME}-v${PLUGIN_VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes, skipping PR"
            exit 0
          fi
          git commit -m "chore: update ${PLUGIN_NAME} to v${PLUGIN_VERSION}"
          # Idempotent: force-push overwrites a stale branch from a previous
          # run for the same version (e.g. when the workflow was re-triggered).
          git push --force origin "$BRANCH"
          # PR may also already exist for that branch — only create if missing.
          if gh pr view "$BRANCH" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "PR for $BRANCH already exists — leaving it open."
          else
            gh pr create \
              --title "plugin: ${PLUGIN_NAME} v${PLUGIN_VERSION}" \
              --body "Automated registry update triggered by \`${PLUGIN_NAME}\` release pipeline.

          **Plugin:** \`${PLUGIN_NAME}\`
          **Version:** \`${PLUGIN_VERSION}\`

          Review \`.claude-plugin/marketplace.json\` and merge to publish the entry to the registry." \
              --base main \
              --head "$BRANCH"
          fi
